aid: hpe
name: Hewlett Packard Enterprise
description: >-
  Hewlett Packard Enterprise (HPE) is a global edge-to-cloud technology
  company providing servers, storage, networking, and hybrid cloud
  services, with HPE GreenLake serving as the unified edge-to-cloud
  platform delivering infrastructure as a service. The HPE GreenLake
  developer platform exposes OpenAPI 3.0 REST APIs covering compute,
  storage, networking, data services, identity, and workspace management,
  all authenticated via OAuth 2.0 client credentials and bearer tokens
  through a unified global API gateway.
type: Index
