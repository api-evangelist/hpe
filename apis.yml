apis:
  - aid: hpe:greenlake-api
    name: HPE GreenLake API
    description: >-
      Unified REST API gateway for HPE GreenLake edge-to-cloud services
      including Compute Ops Management, Data Services Cloud Console,
      identity, workspaces, and API client credentials. Conforms to
      OpenAPI 3.0 and authenticates with OAuth 2.0 client credentials
      that issue short-lived JWT bearer tokens.
    humanURL: https://developer.greenlake.hpe.com
    baseURL: https://global.api.greenlake.hpe.com
